<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>רשימת השירים</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Assistant", sans-serif;
        background: linear-gradient(#f7f3f0, #f0e8e4);
        color: #4a3f35;
        text-align: center;
    }

    .wrapper {
        max-width: 800px;
        margin: 60px auto;
        background: #ffffffdd;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border: 1px solid #e7dcd5;
    }

    h1 {
        font-size: 2.4em;
        margin-bottom: 20px;
        color: #6b4f4f;
    }

    .btn {
        display: block;
        width: 70%;
        margin: 12px auto;
        padding: 14px;
        font-size: 1.2em;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        transition: 0.25s;
        text-decoration: none;
        background: #e8ddd7;
        color: #4a3f35;
    }

    .btn:hover {
        background: #d6cbc4;
    }

    .back {
        margin-top: 40px;
        display: inline-block;
        padding: 12px 24px;
        background: #c9a9a6;
        color: white;
        border-radius: 12px;
        text-decoration: none;
        transition: 0.25s;
    }

    .back:hover {
        background: #b8928f;
    }
</style>
</head>

<body>

<div class="wrapper">
    <h1>רשימת השירים</h1>

    <a href="shir1.html" class="btn">בגידה</a>
    <a href="sire2.html" class="btn">בין תשומת לב לאהבה</a>
    <a href="shir3.html" class="btn">שיר 3</a>
    <a href="shir4.html" class="btn">שיר 4</a>

    <a href="index.html" class="back">חזרה לדף הראשי</a>
</div>

</body>
</html>
