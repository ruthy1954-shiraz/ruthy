<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <title>האתר של רותי</title>

    <link rel="stylesheet" href="style.css">

    <style>

        .home-page {
            font-family: "David", "Arial", sans-serif;
            background-color: #fdfaf6;
            color: #333;
            text-align: center;
            padding: 30px;
            border: 12px solid #d8c3a5;
            box-sizing: border-box;
        }

        .home-page .cover img {
            width: 95%;
            max-width: 650px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
            margin-top: 25px;
        }

        .home-page h1 {
            font-size: 3.6rem;
            margin-top: 30px;
            color: #5a4a3f;
        }

        .home-page h2 {
            font-size: 2rem;
            margin-top: -8px;
            color: #7a6a5f;
            font-weight: normal;
        }

        .home-page p {
            font-size: 2.4rem;
            margin: 30px auto;
            width: 92%;
            line-height: 2.1;
        }

        .home-page .buttons {
            margin-top: 45px;
        }

        .home-page .buttons a {
            display: inline-block;
            margin: 12px;
            padding: 20px 40px;
            background-color: #d8c3a5;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-size: 2rem;
            transition: background-color 0.3s;
        }

        .home-page .buttons a:hover {
            background-color: #c0a98b;
        }

        .home-page .notes-box {
            margin-top: 50px;
            padding: 25px;
            background: #fae7dd;
            border: 1px solid #e3c7b8;
            border-radius: 18px;
            width: 92%;
            margin-left: auto;
            margin-right: auto;
        }

        .home-page .notes-box input,
        .home-page .notes-box textarea {
            width: 100%;
            font-size: 2.3rem;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #c9a99a;
            margin-bottom: 14px;
            background-color: #fff7f2;
        }

        .home-page .notes-box textarea {
            height: 170px;
            resize: vertical;
        }

        .home-page .footer-nav a {
            padding: 14px 28px;
            font-size: 2.4rem;
            font-weight: 700;
            background-color: #d8c3a5;
            color: white;
            border-radius: 20px;
            text-decoration: none;
            margin: 0 8px;
            display: inline-block;
        }

        .home-page .footer-nav a:hover {
            background-color: #c0a98b;
        }

        .home-page .notes-box h4 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-top: 25px;
            color: #5a4a3f;
        }

        #notes {
            margin-top: 20px;
            text-align: right;
            font-size: 2rem;
            line-height: 1.7;
        }

        .note-item {
            background-color: #fff7f2;
            border: 1px solid #e3c7b8;
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 18px;
            position: relative;
        }

        .note-delete {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #d8c3a5;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            text-align: center;
            line-height: 32px;
            font-size: 1.6rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .note-delete:hover {
            background-color: #c0a98b;
        }

    </style>
</head>

<body class="home-page">

<div class="wrapper">

    <div class="cover">
        <img src="content/images/shir.jpeg" alt="עטיפת הספר לגעת">
    </div>

    <h1>לגעת</h1>
    <h2>ספר השירה של רות שנן</h2>

    <p>
        רגע לפני שהמילים נולדות,<br>
        היד נוגעת בדף,<br>
        והלב נפתח.<br><br>
        הזמנה לגעת, להרגיש, להקשיב.
    </p>

    <div class="buttons">
        <a href="content/song.html">שירים</a>
        <a href="content/about.html">על הספר</a>
    </div>

    <div class="notes-box">
        <h3>כתיבת הערות והארות</h3>
        
        <input id="userName" placeholder="השם שלך..." />
        <input id="userSong" placeholder="שם הדף..." value="דף הבית" />
        <textarea id="userNote" placeholder="כתבי כאן את מחשבותייך על האתר..."></textarea>

        <div class="footer-nav" style="margin-top:15px;">
            <a id="waLink">ווצאפ לכותבת</a>
        </div>

        <h4>הערות שנשמרו:</h4>
        <div id="notes"></div>
    </div>

</div>

<script>
    var songId = "homepage";
</script>

<!-- ⭐⭐ השורה החשובה שנוספה ⭐⭐ -->
<script type="module" src="content/notes.js"></script>

<script type="module">
 
    const waLink = document.getElementById("waLink");
    const saveLink = document.getElementById("saveLink");

    const phone = "972545305123";

    waLink.addEventListener("click", function() {
        const name = document.getElementById("userName").value.trim();
        const song = document.getElementById("userSong").value.trim();
        const note = document.getElementById("userNote").value.trim();

        const message =
            `שם הכותב: ${name}\n` +
            `שם הדף: ${song}\n` +
            `הערה: ${note}`;

        const encoded = encodeURIComponent(message);
        window.open(`https://wa.me/${phone}?text=${encoded}`, "_blank");
    });

    saveLink.addEventListener("click", function() {
        const name = document.getElementById("userName").value.trim();
        const song = document.getElementById("userSong").value.trim();
        const note = document.getElementById("userNote").value.trim();

        saveNoteToFirestore(name, song, note, songId);
    });

    initNoteSystem(songId);
</script>

</body>
</html>
