<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ספר השירים – רות שנן</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Assistant", sans-serif;
        background: linear-gradient(#f7f3f0, #f0e8e4);
        color: #4a3f35;
        text-align: center;
    }

    .wrapper {
        max-width: 800px;
        margin: 60px auto;
        background: #ffffffdd;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border: 1px solid #e7dcd5;
    }

    h1 {
        font-size: 2.6em;
        margin-bottom: 10px;
        color: #6b4f4f;
    }

    h2 {
        font-size: 1.6em;
        margin-top: 40px;
        color: #7a5e5e;
    }

    p {
        font-size: 1.2em;
        color: #7a6a63;
    }

    .btn {
        display: inline-block;
        margin: 12px;
        padding: 14px 30px;
        font-size: 1.1em;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        transition: 0.25s;
        text-decoration: none;
    }

    .btn-main {
        background: #c9a9a6;
        color: white;
    }
    .btn-main:hover {
        background: #b8928f;
    }

    .btn-light {
        background: #e8ddd7;
        color: #4a3f35;
    }
    .btn-light:hover {
        background: #d6cbc4;
    }

    .frame {
        margin-top: 40px;
        padding: 25px;
        border: 2px dashed #d8cfc4;
        border-radius: 14px;
        background: #faf7f5;
        font-size: 1.1em;
        color: #6b4f4f;
        line-height: 1.8;
    }
</style>
</head>

<body>

<div class="wrapper">
    <h1>ספר השירים</h1>
    <p>לגעת</p>

    <a href="songs.html" class="btn btn-main">לקריאת השירים</a>
    <a href="#about" class="btn btn-light">קצת על רות שנן</a>

    <div class="frame">
        ''אנשים חושבים בטעות שהם מפסיקים להתאהב בזקנתם,  
        מבלי לדעת שמזדקנים ברגע שמפסיקים להתאהב''  
        (גארסיה מארקס)
    </div>

    <h2 id="about">קצת על רות שנן</h2>
    <p>מתבוננת ברגעים, והיד מתחילה לכתוב.</p>
</div>

</body>
</html>
