<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ספר השירים</title>
<style>
    body {
        font-family: "Assistant", sans-serif;
        background: #f7f3f0;
        margin: 0;
        padding: 0;
        text-align: center;
        color: #4a3f35;
    }

    .container {
        max-width: 700px;
        margin: 60px auto;
        background: #ffffffcc;
        padding: 40px;
        border-radius: 18px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        border: 1px solid #e8ddd7;
    }

    h1 {
        font-size: 2.4em;
        margin-bottom: 10px;
        color: #6b4f4f;
    }

    p.subtitle {
        font-size: 1.2em;
        margin-bottom: 30px;
        color: #8a6f63;
    }

    .btn {
        display: inline-block;
        margin: 10px;
        padding: 14px 28px;
        font-size: 1.1em;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        transition: 0.25s;
        text-decoration: none;
        color: white;
    }

    .btn-primary {
        background: #c9a9a6;
    }
    .btn-primary:hover {
        background: #b8928f;
    }

    .btn-secondary {
        background: #d8cfc4;
        color: #4a3f35;
    }
    .btn-secondary:hover {
        background: #c7bdb2;
    }

    .frame {
        margin-top: 40px;
        padding: 20px;
        border: 2px dashed #d8cfc4;
        border-radius: 12px;
        background: #faf7f5;
        color: #6b4f4f;
    }
</style>
</head>

<body>

<div class="container">
    <h1>ספר השירים</h1>
    <p class="subtitle">מילים שנולדו מלב רך</p>

    <a href="#" class="btn btn-primary">לקריאת השירים</a>
    <a href="#" class="btn btn-secondary">על המחברת</a>

    <div class="frame">
        זה המקום להוסיף משפט פתיחה, ציטוט, או הקדמה קצרה שתכניס את הקורא לאווירה.
    </div>
</div>

</body>
</html>
