<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לגעת / רות שנן</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

    <!-- תמונת הדף -->
    <div class="song-image">
        <img src="content/images/shir.jpeg" alt="עטיפת הספר לגעת">
    </div>

    <!-- כותרות -->
    <h1 class="song-title">לגעת</h1>
    <h2 class="song-author">ספר השירה של רות שנן</h2>

    <!-- טקסט הדף -->
    <div class="song-box">
        <p>
            רגע לפני שהמילים נולדות,<br>
            היד נוגעת בדף,<br>
            והלב נפתח.<br><br>
            הזמנה לגעת, להרגיש, להקשיב.
        </p>
    </div>

    <!-- תיבת הערות -->
    <div class="notes-box">
        <h3>כתיבת הערות והארות</h3>

        <input id="userName" placeholder="השם שלכם..." />
        <input id="userSong" placeholder="שם הדף..." value="דף הבית" />
        <textarea id="userNote" placeholder="כתבו כאן את מחשבותיכם על האתר..."></textarea>

        <div class="footer-nav" style="margin-top:15px;">
            <a id="waLink">ווצאפ לכותבת</a> |
            <a id="saveLink">שמירת הערה</a>
        </div>

        <h4>הערות קוראים שנשמרו:</h4>
        <div id="notes"></div>
    </div>

</div>

<!-- ניווט -->
<div class="footer-nav">
    <a href="content/poets/write-poem.html" class="join-btn">כתיבת שיר חדש</a> |
    <a href="content/poets/poets.html" class="join-btn">בימת המשוררים</a> |
    <a href="content/song.html">שירים</a> |
    <a href="content/tikshurim/tikshurim-list.html">תקשורים</a> |
    <a href="content/about.html">על הספר</a> |
    <a href="content/about-author.html">אודות המחברת</a>
</div>

<!-- מזהה ייחודי לדף -->
<script>
    var songId = "homepage";
</script>

<!-- מערכת ההערות + ווצאפ -->
<script type="module">
    import { initNoteSystem, saveNoteToFirestore } from "./notes.js";

    initNoteSystem(songId);

    const waLink = document.getElementById("waLink");
    const saveLink = document.getElementById("saveLink");
    const phone = "972545305123";

    // שליחת הודעה בווצאפ
    waLink.addEventListener("click", () => {
        const name = document.getElementById("userName").value.trim();
        const song = document.getElementById("userSong").value.trim();
        const note = document.getElementById("userNote").value.trim();

        const message = `שם הכותב: ${name}\nדף: ${song}\nהערה: ${note}`;
        const encoded = encodeURIComponent(message);
        window.open(`https://wa.me/${phone}?text=${encoded}`, "_blank");
    });

    // שמירת הערה בענן
    saveLink.addEventListener("click", () => {
        const name = document.getElementById("userName").value.trim();
        const song = document.getElementById("userSong").value.trim();
        const note = document.getElementById("userNote").value.trim();

        saveNoteToFirestore(name, song, note, songId);
    });
</script>

<!-- כפתור שיתוף -->
<button class="share-btn" onclick="shareSong()">שתפו את הספר</button>

<script>
function shareSong() {
    if (navigator.share) {
        navigator.share({
            title: "לגעת — ספר השירה של רות שנן",
            text: "רציתי לשתף אתך באתר ספר השירים גם התקשור:",
            url: window.location.href
        });
    } else {
        alert("הדפדפן לא תומך בשיתוף אוטומטי");
    }
}
</script>

<style>
.share-btn {
    margin: 25px auto;
    padding: 12px 20px;
    background-color: #f2e6ff;
    border: 1px solid #d3b8ff;
    border-radius: 8px;
    font-size: 18px;
    color: #4a2c6b;
    cursor: pointer;
    display: block;
    width: 200px;
    transition: 0.2s;
}
.share-btn:hover {
    background-color: #e8d6ff;
}
</style>

</body>
</html>
