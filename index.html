<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לגעת / רות שנן</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-page">

<div class="wrapper">

    <div class="cover">
        <img src="content/images/shir.jpeg" alt="עטיפת הספר לגעת">
    </div>

    <h1>לגעת</h1>
    <h2>ספר השירה של רות שנן</h2>

    <p>
        רגע לפני שהמילים נולדות,<br>
        היד נוגעת בדף,<br>
        והלב נפתח.<br><br>
        הזמנה לגעת, להרגיש, להקשיב.
    </p>

    <div class="buttons">
        <a href="content/song.html">שירים</a>
        <a href="content/about.html">על הספר</a>
        <a class="share-btn" onclick="shareSong()">📤 שתפו את הספר</a>
    </div>

    <div class="home-buttons-row">
        <a id="waLink" class="whatsapp-btn">ווצאפ לכותבת</a>
        <a id="saveLink" class="note-btn">שמירת הערה</a>
    </div>

    <div class="notes-box">
        <h3>כתיבת הערות והארות</h3>
        <input id="userName" placeholder="השם שלך..." />
        <input id="userSong" placeholder="שם הדף..." value="דף הבית" />
        <textarea id="userNote" placeholder="כתבי כאן את מחשבותייך על האתר..."></textarea>

        <h4>הערות קוראים שנשמרו:</h4>
        <div id="notes"></div>
    </div>

</div>

<script>
    var songId = "homepage";
</script>

<!-- ⭐ מערכת ההערות + ווצאפ ⭐ -->
<script type="module">
    import { initNoteSystem, saveNoteToFirestore } from "./notes.js";

    initNoteSystem(songId);

    const waLink = document.getElementById("waLink");
    const saveLink = document.getElementById("saveLink");
    const phone = "972545305123";

    waLink.addEventListener("click", function() {
        const name = document.getElementById("userName").value.trim();
        const song = document.getElementById("userSong").value.trim();
        const note = document.getElementById("userNote").value.trim();

        const message =
            `שם הכותב: ${name}\n` +
            `דף: ${song}\n` +
            `הערה: ${note}`;

        const encoded = encodeURIComponent(message);
        window.open(`https://wa.me/${phone}?text=${encoded}`, "_blank");
    });

    saveLink.addEventListener("click", function() {
        const name = document.getElementById("userName").value.trim();
        const song = document.getElementById("userSong").value.trim();
        const note = document.getElementById("userNote").value.trim();

        saveNoteToFirestore(name, song, note, songId);
    });
</script>

<script>
function shareSong() {
    if (navigator.share) {
        navigator.share({
            title: "לגעת — ספר השירה של רות שנן",
            text: "רציתי לשתף את הספר היפה הזה:",
            url: window.location.href
        });
    } else {
        alert("הדפדפן שלך לא תומך בשיתוף אוטומטי");
    }
}
</script>

</body>
</html>
