<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>שם השיר</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Assistant", sans-serif;
        background: linear-gradient(#f7f3f0, #f0e8e4);
        color: #4a3f35;
        text-align: center;
    }

    .wrapper {
        max-width: 800px;
        margin: 60px auto;
        background: #ffffffdd;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border: 1px solid #e7dcd5;
    }

    h1 {
        font-size: 2.2em;
        margin-bottom: 20px;
        color: #6b4f4f;
    }

    .art-box {
        width: 100%;
        height: 260px;
        border: 2px dashed #d8cfc4;
        border-radius: 14px;
        background: #faf7f5;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #8a6f63;
        font-size: 1.1em;
    }

    .poem {
        white-space: pre-line;
        font-size: 1.3em;
        line-height: 1.8;
        color: #4a3f35;
        margin-bottom: 40px;
    }

    .back {
        display: inline-block;
        padding: 12px 24px;
        background: #c9a9a6;
        color: white;
        border-radius: 12px;
        text-decoration: none;
        transition: 0.25s;
    }

    .back:hover {
        background: #b8928f;
    }
</style>
</head>

<body>

<div class="wrapper">

    <h1>שם השיר</h1>

    <div class="art-box">
        כאן יופיע הציור שלך
    </div>

    <div class="poem">
        כאן כותבים את השיר<br>
        שורה אחרי שורה<br>
        בדיוק כפי שאת רוצה
    </div>
<a href="index.html" class="back">חזרה לדף הראשי</a>

    <a href="songs.html" class="back">חזרה לרשימת השירים</a>

</div>

</body>
</html>
