<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בימת המשוררים</title>
    <link rel="stylesheet" href="/ruthy/style.css?v=30">
</head>

<body>

<div class="wrapper">

    <h1 class="song-title">בימת המשוררים</h1>

    <!-- כפתור כתיבת שיר חדש -->
    <div class="footer-nav" style="margin-bottom:20px;">
        <a href="write-poem.html" class="join-btn">כתיבת שיר חדש</a>
    </div>

    <!-- כאן תופיע רשימת השירים -->
    <div id="poemsList"></div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMepXTjui58oUJOaVQgmXo8L0IjT1pPxQ",
      authDomain: "ruthy-notes.firebaseapp.com",
      projectId: "ruthy-notes",
      storageBucket: "ruthy-notes.firebasestorage.app",
      messagingSenderId: "276333962292",
      appId: "1:276333962292:web:298a0e8db8b5f77c359661",
      measurementId: "G-6MDZNCXET4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadPoems() {
        const q = query(collection(db, "poems"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);

        const container = document.getElementById("poemsList");
        container.innerHTML = "";

        snapshot.forEach(doc => {
            const poem = doc.data();
            const id = doc.id;

            container.innerHTML += `
                <div class="song-box">
                    <h2>${poem.title}</h2>
                    <h3>${poem.author}</h3>
                    <a href="poem.html?id=${id}">לקריאת השיר</a>
                </div>
            `;
        });
    }

    loadPoems();
</script>

</body>
</html>
