<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בימת המשוררים</title>
    <link rel="stylesheet" href="/ruthy/style.css?v=30">

    <style>
        body {
            background: #fafafa;
        }

        .wrapper {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .poem-card {
            display: flex;
            align-items: center;
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .poem-card:hover {
            transform: scale(1.02);
        }

        .poet-img {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
            margin-left: 15px;
            background: #eee;
        }

        .poem-info {
            flex-grow: 1;
        }

        .poem-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0;
        }

        .poem-author {
            font-size: 16px;
            color: #666;
            margin: 5px 0 10px 0;
        }

        .btn-edit {
            background: #2196f3;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-view {
            background: #4caf50;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            margin-right: 8px;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <h1>בימת המשוררים</h1>

    <div id="poemsList"></div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMepXTjui58oUJOaVQgmXo8L0IjT1pPxQ",
      authDomain: "ruthy-notes.firebaseapp.com",
      projectId: "ruthy-notes",
      storageBucket: "ruthy-notes.firebasestorage.app",
      messagingSenderId: "276333962292",
      appId: "1:276333962292:web:298a0e8db8b5f77c359661",
      measurementId: "G-6MDZNCXET4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const poemsList = document.getElementById("poemsList");

    async function loadPoems() {
        const q = query(collection(db, "poems"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);

        poemsList.innerHTML = "";

        querySnapshot.forEach((doc) => {
            const poem = doc.data();
            const id = doc.id;

            const image = poem.image && poem.image.trim() !== ""
                ? poem.image
                : "../images/default-poem.jpg";

            const card = `
                <div class="poem-card">
                    <img class="poet-img" src="${image}" alt="תמונת משורר">

                    <div class="poem-info">
                        <p class="poem-title">${poem.title}</p>
                        <p class="poem-author">${poem.author}</p>

                        <a class="btn-view" href="poem.html?id=${id}">לצפייה</a>
                        <a class="btn-edit" href="edit-poem.html?id=${id}">עריכה</a>
                    </div>
                </div>
            `;

            poemsList.innerHTML += card;
        });
    }

    loadPoems();
</script>

</body>
</html>
