<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שירי המשוררים</title>
    <link rel="stylesheet" href="/ruthy/style.css?v=30">

    <style>
        .poem-box {
            background: #ffffff;
            padding: 20px;
            margin: 20px 0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .poem-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .edit-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .delete-btn {
            background-color: #e53935;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>שירי המשוררים</h1>

<div id="poemsContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMepXTjui58oUJOaVQgmXo8L0IjT1pPxQ",
      authDomain: "ruthy-notes.firebaseapp.com",
      projectId: "ruthy-notes",
      storageBucket: "ruthy-notes.firebasestorage.app",
      messagingSenderId: "276333962292",
      appId: "1:276333962292:web:298a0e8db8b5f77c359661",
      measurementId: "G-6MDZNCXET4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const poemsContainer = document.getElementById("poemsContainer");

    async function loadPoems() {
        const querySnapshot = await getDocs(collection(db, "poems"));

        querySnapshot.forEach((docItem) => {
            const poem = docItem.data();
            const id = docItem.id;

            const div = document.createElement("div");
            div.classList.add("poem-box");

            div.innerHTML = `
                <h2>${poem.title}</h2>
                <h3>${poem.author}</h3>
                <p>${poem.text.replace(/\n/g, "<br>")}</p>

                <div class="poem-actions">
                    <button class="edit-btn" data-id="${id}">עריכה</button>
                    <button class="delete-btn" data-id="${id}">X</button>
                </div>
            `;

            poemsContainer.appendChild(div);
        });
    }

    loadPoems();

    // מחיקה
    document.addEventListener("click", async (e) => {
        if (e.target.classList.contains("delete-btn")) {
            const id = e.target.dataset.id;

            if (confirm("למחוק את השיר?")) {
                await deleteDoc(doc(db, "poems", id));
                alert("השיר נמחק");
                location.reload();
            }
        }
    });

    // עריכה
    document.addEventListener("click", (e) => {
        if (e.target.classList.contains("edit-btn")) {
            const id = e.target.dataset.id;
            window.location.href = `edit-poem.html?id=${id}`;
        }
    });
</script>

</body>
</html>
