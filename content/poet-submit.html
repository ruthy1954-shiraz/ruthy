<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צרפו את השיר שלכם</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="wrapper">

    <h1 class="song-title">צרפו את השיר שלכם</h1>
    <h2 class="song-author">מקום לכתיבת שיר חדש</h2>

    <!-- שדות מילוי -->
    <h3>שם השיר</h3>
    <input id="poemTitle" placeholder="שם השיר..." style="width:100%; text-align:center; font-size:1.4rem; border:none; border-bottom:1px solid #ccc; margin-bottom:15px;">

    <h3>שם המשורר</h3>
    <input id="poetName" placeholder="שם המשורר..." style="width:100%; text-align:center; font-size:1.2rem; border:none; border-bottom:1px solid #ccc; margin-bottom:15px;">

    <h3>כתבו כאן את השיר שלכם</h3>
    <textarea id="poemText" class="auto-expand" placeholder="כתבו כאן את השיר שלכם..." style="width:100%; border:none; resize:none; line-height:2; font-size:1.1rem; color:#5a4a3f; background:transparent; padding:10px;"></textarea>

    <!-- כפתורים -->
    <div class="footer-nav" style="margin-top:25px;">
        <a id="savePoem" class="join-btn">שמירת השיר</a>
        <a id="sendPoem" class="join-btn">שליחת השיר</a>
    </div>

</div>

<!-- JavaScript לתיבה מתרחבת -->
<script>
document.addEventListener("input", function(e) {
    if (e.target.classList.contains("auto-expand")) {
        e.target.style.height = "auto";
        e.target.style.height = (e.target.scrollHeight) + "px";
    }
});
</script>

</body>
</html>
