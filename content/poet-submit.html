<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בימת המשוררים</title>

    <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="wrapper">

    <h1 class="song-title">בימת המשוררים</h1>
    <h2 class="song-author">מקום לשירים חדשים</h2>

    <!-- שורה עם קו תחתון -->
    <div class="poet-upload">
        <p>כאן אפשר לצרף את השיר שלך</p>
    </div>

    <!-- כפתור מעבר לדף כתיבת שיר -->
    <div class="footer-nav" style="margin-top:25px;">
        <a href="poet-submit.html" class="join-btn">צרפו את השיר שלכם</a>
    </div>
<script>
document.addEventListener("input", function(e) {
    if (e.target.classList.contains("auto-expand")) {
        e.target.style.height = "auto";
        e.target.style.height = (e.target.scrollHeight) + "px";
    }
});
</script>

</div>

</body>
</html>
