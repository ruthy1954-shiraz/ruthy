<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צרפו את השיר שלכם</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="wrapper">

    <!-- תמונת השיר -->
    <div class="song-image">
        <img src="images/default-poem.jpg" alt="תמונה לשיר">
    </div>

    <!-- כותרות -->
    <h1 class="song-title">
        <input id="poemTitle" placeholder="שם השיר..." style="width:100%; text-align:center; font-size:2rem; border:none; border-bottom:1px solid #ccc;">
    </h1>

    <h2 class="song-author">
        <input id="poetName" placeholder="שם המשורר..." style="width:100%; text-align:center; font-size:1.4rem; border:none; border-bottom:1px solid #ccc;">
    </h2>

    <!-- טקסט השיר -->
    <div class="song-box">
        <textarea id="poemText" class="auto-expand" placeholder="כתבו כאן את השיר שלכם..." style="width:100%; border:none; resize:none; line-height:2; font-size:1.2rem; color:#5a4a3f; background:transparent; padding:10px;"></textarea>
    </div>

    <!-- תיבת הערות -->
    <div class="notes-box">
        <h3>כתיבת הערות והארות</h3>

        <input id="userName" placeholder="השם שלכם..." />
        <input id="userSong" placeholder="שם השיר..." />
        <textarea id="userNote" placeholder="כתבו כאן את מחשבותיכם על השיר..."></textarea>

        <div class="footer-nav" style="margin-top:15px;">
            <a id="waLink">ווצאפ לכותבת</a> |
            <a id="saveLink">שמירת הערה</a>
        </div>

        <h4>הערות קוראים שנשמרו:</h4>
        <div id="notes"></div>
    </div>

    <!-- ניווט עדין -->
    <div class="footer-nav">
        <a href="../index.html">עמוד ראשי</a> |
        <a href="poets.html">חזרה לבימת המשוררים</a>
    </div>

</div>

<!-- JavaScript לתיבה מתרחבת -->
<script>
document.addEventListener("input", function(e) {
    if (e.target.classList.contains("auto-expand")) {
        e.target.style.height = "auto";
        e.target.style.height = (e.target.scrollHeight) + "px";
    }
});
</script>

</body>
</html>
