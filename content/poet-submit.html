<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צרפו את השיר שלכם</title>
    <link rel="stylesheet" href="/ruthy/style.css?v=30">
</head>

<body>

<div class="wrapper">

    <div class="song-image">
        <img src="../images/default-poem.jpg" alt="תמונה לשיר">
    </div>

    <h1 class="song-title">
        <input id="poemTitle" class="song-input" placeholder="שם השיר...">
    </h1>

    <h2 class="song-author">
        <input id="poetName" class="song-input" placeholder="שם המשורר...">
    </h2>

    <div class="song-box">
        <textarea id="poemText" class="song-textarea auto-expand" placeholder="כתבו כאן את השיר שלכם..."></textarea>
    </div>

    <p class="required-line">שמירת השיר נחוץ!</p>

    <div class="footer-nav">
        <a id="savePoem">שמירת השיר</a>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMepXTjui58oUJOaVQgmXo8L0IjT1pPxQ",
      authDomain: "ruthy-notes.firebaseapp.com",
      projectId: "ruthy-notes",
      storageBucket: "ruthy-notes.firebasestorage.app",
      messagingSenderId: "276333962292",
      appId: "1:276333962292:web:298a0e8db8b5f77c359661",
      measurementId: "G-6MDZNCXET4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById("savePoem").addEventListener("click", async () => {
        const title = document.getElementById("poemTitle").value.trim();
        const author = document.getElementById("poetName").value.trim();
        const text = document.getElementById("poemText").value.trim();

        if (!title || !author || !text) {
            alert("יש למלא את כל השדות");
            return;
        }

        await addDoc(collection(db, "poems"), {
            title,
            author,
            text,
            createdAt: serverTimestamp()
        });

        alert("השיר נשמר בהצלחה!");
        window.location.href = "poets.html";
    });
</script>

</body>
</html>
