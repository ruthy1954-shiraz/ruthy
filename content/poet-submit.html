<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צרפו את השיר שלכם</title>

    <!-- טעינת העיצוב המקורי של דפי השירים -->
    <link rel="stylesheet" href="/ruthy/style.css?v=30">
</head>

<body>

<div class="wrapper">

    <!-- תמונת ברירת מחדל -->
    <div class="song-image">
        <img src="../images/default-poem.jpg" alt="תמונה לשיר">
    </div>

    <!-- שם השיר -->
    <h1 class="song-title">
        <input id="poemTitle" class="song-input" placeholder="שם השיר...">
    </h1>

    <!-- שם המשורר -->
    <h2 class="song-author">
        <input id="poetName" class="song-input" placeholder="שם המשורר...">
    </h2>

    <!-- גוף השיר -->
    <div class="song-box">
        <textarea id="poemText" class="song-textarea auto-expand" placeholder="כתבו כאן את השיר שלכם..."></textarea>
    </div>

    <!-- שורה סגולה: שמירת השיר נחוץ -->
    <p class="required-line">שמירת השיר נחוץ!</p>

    <!-- תיבת הערות -->
    <div class="notes-box">
        <h3>כתיבת הערות והארות</h3>

        <input id="userName" placeholder="השם שלכם...">
        <input id="userSong" placeholder="שם השיר...">
        <textarea id="userNote" placeholder="כתבו כאן את מחשבותיכם על השיר..."></textarea>

        <div class="footer-nav" style="margin-top:15px;">
            <a id="waLink">ווצאפ לכותבת</a> |
            <a id="saveLink">שמירת הערה</a>
        </div>

        <h4>הערות קוראים שנשמרו:</h4>
        <div id="notes"></div>
    </div>

    <!-- ניווט -->
    <div class="footer-nav">
        <a href="../index.html">עמוד ראשי</a> |
        <a href="poets.html">חזרה לבימת המשוררים</a>
    </div>

</div>

<!-- תיבה מתרחבת -->
<script>
document.addEventListener("input", function(e) {
    if (e.target.classList.contains("auto-expand")) {
        e.target.style.height = "auto";
        e.target.style.height = (e.target.scrollHeight) + "px";
    }
});
</script>

</body>
</html>
