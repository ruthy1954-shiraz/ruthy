<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כתיבת שיר חדש / רות שנן</title>

    <!-- קובץ העיצוב הראשי -->
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="wrapper">

    <!-- תמונה אוטומטית לפי אווירת השיר -->
    <div class="song-image">
        <img id="autoImage" src="default-poem.jpg" alt="תמונה לשיר">
    </div>

    <h1 class="song-title">כתיבת שיר חדש</h1>
    <h2 class="song-author">רות שנן</h2>

    <div class="song-box">
        <form id="poemForm">
            <input id="title" placeholder="כותרת השיר" required>
            <input id="author" placeholder="שם המשורר" required>

            <!-- תיבת כתיבה אלסטית -->
            <textarea id="text" placeholder="כתבי כאן את השיר..." 
                      oninput="autoGrow(this); detectMood();" required></textarea>

            <button type="submit">שמרי שיר</button>
        </form>
    </div>

    <div class="footer-nav" style="margin-top:20px;">
        <a href="poets.html" class="join-btn">חזרה לבימת המשוררים</a> |
        <a href="../index.html">עמוד ראשי</a>
    </div>

</div>

<!-- Firestore -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMepXTjui58oUJOaVQgmXo8L0IjT1pPxQ",
      authDomain: "ruthy-notes.firebaseapp.com",
      projectId: "ruthy-notes",
      storageBucket: "ruthy-notes.firebasestorage.app",
      messagingSenderId: "276333962292",
      appId: "1:276333962292:web:298a0e8db8b5f77c359661",
      measurementId: "G-6MDZNCXET4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById("poemForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const title = document.getElementById("title").value;
        const author = document.getElementById("author").value;
        const text = document.getElementById("text").value;

        await addDoc(collection(db, "poems"), {
            title,
            author,
            text,
            createdAt: serverTimestamp()
        });

        alert("השיר נשמר בהצלחה!");
        window.location.href = "poets.html";
    });
</script>

<!-- פונקציות עיצוב ואווירה -->
<script>
// תיבת כתיבה אלסטית
function autoGrow(el) {
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
}

// בחירת תמונה לפי אווירה
function detectMood() {
    const text = document.getElementById("text").value;
    const img = document.getElementById("autoImage");

    const moods = [
        { words: ["ים", "גל", "מים"], img: "sea.jpeg" },
        { words: ["לילה", "חושך", "ירח"], img: "night.jpeg" },
        { words: ["אהבה", "לב", "נשיקה"], img: "love.jpeg" },
        { words: ["כאב", "דמעה", "שבר"], img: "sad.jpeg" },
        { words: ["אור", "שמש", "תקווה"], img: "light.jpeg" }
    ];

    for (let mood of moods) {
        if (mood.words.some(w => text.includes(w))) {
            img.src = mood.img;
            return;
        }
    }

    img.src = "default-poem.jpg";
}
</script>

<style>
/* עיצוב רך בסגנון הספר */
.song-box {
    background-color: #faf6f0;
    border: 1px solid #e0d6c8;
    border-radius: 12px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 0 10px rgba(180, 160, 140, 0.2);
}

.song-box input,
.song-box textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
    font-family: 'David', serif;
    font-size: 18px;
    border: 1px solid #d3b8ff;
    border-radius: 8px;
    background-color: #fffafc;
}

.song-box textarea {
    min-height: 120px;
    overflow: hidden;
}

.song-box button {
    background-color: #f2e6ff;
    border: 1px solid #d3b8ff;
    border-radius: 8px;
    font-size: 18px;
    color: #4a2c6b;
    cursor: pointer;
    padding: 10px 20px;
    transition: 0.2s;
}
.song-box button:hover {
    background-color: #e8d6ff;
}
</style>

</body>
</html>
