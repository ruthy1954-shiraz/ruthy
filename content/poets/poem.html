<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שיר</title>
    <link rel="stylesheet" href="/ruthy/style.css?v=30">

    <style>
        body {
            background: #fafafa;
            font-family: "Assistant", sans-serif;
        }

        .wrapper {
            max-width: 700px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }

        .poem-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .poem-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .poem-author {
            font-size: 18px;
            color: #666;
            margin-bottom: 25px;
        }

        .poem-text {
            font-size: 20px;
            line-height: 1.8;
            white-space: pre-line;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            background-color: #2196f3;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="wrapper">
    <img id="poemImage" class="poem-image" src="../images/default-poem.jpg" alt="תמונת השיר">
    <h1 id="poemTitle" class="poem-title"></h1>
    <h2 id="poemAuthor" class="poem-author"></h2>
    <div id="poemText" class="poem-text"></div>

    <a href="poets.html" class="back-btn">חזרה לבימת המשוררים</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMepXTjui58oUJOaVQgmXo8L0IjT1pPxQ",
      authDomain: "ruthy-notes.firebaseapp.com",
      projectId: "ruthy-notes",
      storageBucket: "ruthy-notes.firebasestorage.app",
      messagingSenderId: "276333962292",
      appId: "1:276333962292:web:298a0e8db8b5f77c359661",
      measurementId: "G-6MDZNCXET4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const poemId = urlParams.get("id");

    const poemImage = document.getElementById("poemImage");
    const poemTitle = document.getElementById("poemTitle");
    const poemAuthor = document.getElementById("poemAuthor");
    const poemText = document.getElementById("poemText");

    async function loadPoem() {
        const docRef = doc(db, "poems", poemId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const poem = docSnap.data();

            poemTitle.textContent = poem.title;
            poemAuthor.textContent = poem.author;
            poemText.textContent = poem.text;

            // אם יש תמונה — מציגים אותה
            if (poem.image && poem.image.trim() !== "") {
                poemImage.src = poem.image;
            } else {
                poemImage.src = "../images/default-poem.jpg";
            }
        } else {
            alert("השיר לא נמצא");
            window.location.href = "poets.html";
        }
    }

    loadPoem();
</script>

</body>
</html>
