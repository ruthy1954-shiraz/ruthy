<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הוספת שיר חדש</title>
    <link rel="stylesheet" href="/ruthy/style.css?v=30">

    <style>
        .wrapper { max-width: 600px; margin: auto; padding: 20px; }
        #openCopilotBtn {
            background-color: #2196f3; color: white; padding: 8px 14px;
            border-radius: 6px; cursor: pointer; margin-top: 10px; border: none;
        }
        #savePoem {
            background-color: #4caf50; color: white; padding: 10px 18px;
            border-radius: 8px; cursor: pointer; display: inline-block; margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <h1>הוספת שיר חדש</h1>

    <div class="poet-image-box">
        <img id="poetImagePreview" src="../images/default-poem.jpg" style="width:150px; border-radius:10px;">
    </div>

    <label>תמונת המשורר:</label>
    <input id="poetImage" class="song-input" placeholder="images/poets/poet.jpg">

    <button id="openCopilotBtn">ציירו לנו תמונה ב‑Copilot</button>

    <br><br>

    <label>שם השיר:</label>
    <input id="poemTitle" class="song-input">

    <label>שם המשורר:</label>
    <input id="poetName" class="song-input">

    <label>תוכן השיר:</label>
    <textarea id="poemText" class="song-textarea auto-expand"></textarea>

    <div id="savePoem">שמירת השיר</div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMepXTjui58oUJOaVQgmXo8L0IjT1pPxQ",
      authDomain: "ruthy-notes.firebaseapp.com",
      projectId: "ruthy-notes",
      storageBucket: "ruthy-notes.firebasestorage.app",
      messagingSenderId: "276333962292",
      appId: "1:276333962292:web:298a0e8db8b5f77c359661",
      measurementId: "G-6MDZNCXET4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const titleInput = document.getElementById("poemTitle");
    const authorInput = document.getElementById("poetName");
    const textInput = document.getElementById("poemText");
    const imageInput = document.getElementById("poetImage");
    const imagePreview = document.getElementById("poetImagePreview");

    imageInput.addEventListener("input", () => {
        imagePreview.src = imageInput.value;
    });

    // כפתור Copilot משודרג
    document.getElementById("openCopilotBtn").addEventListener("click", async () => {
        const title = titleInput.value.trim();
        const author = authorInput.value.trim();
        const text = textInput.value.trim();

        const poemUrl = "https://yourwebsite.com/poem.html?preview=new";

        if (!text) {
            alert("כתבו קודם את השיר.");
            return;
        }

        const fullPrompt =
`ציירו תמונה שמתאימה לשיר "${title}" מאת ${author}.

הנה השיר:
${text}

קישור לשיר באתר:
${poemUrl}

אנא צרו תמונה שמבטאת את האווירה, הרגש והדימויים המרכזיים.

לאחר יצירת התמונה, אנא ספקו קישור חזרה לאתר:
${poemUrl}
`;

        await navigator.clipboard.writeText(fullPrompt);
        alert("הטקסט הועתק. הדביקו אותו ב‑Copilot.");
        window.open("https://copilot.microsoft.com", "_blank");
    });

    document.getElementById("savePoem").addEventListener("click", async () => {
        const title = titleInput.value.trim();
        const author = authorInput.value.trim();
        const text = textInput.value.trim();
        const image = imageInput.value.trim();

        if (!title || !author || !text) {
            alert("יש למלא את כל השדות");
            return;
        }

        await addDoc(collection(db, "poems"), {
            title, author, text, image, createdAt: serverTimestamp()
        });

        alert("השיר נשמר בהצלחה!");
        window.location.href = "poets.html";
    });
</script>

</body>
</html>
