<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדות וכהות / רות שנן</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="wrapper">

    <!-- תמונת השיר -->
    <div class="song-image">
        <img src="images/shir7.jpeg" alt="ציור לשיר חדות וכהות">
    </div>

    <!-- כותרות -->
    <h1 class="song-title">חדות וכהות</h1>
    <h2 class="song-author">רות שנן</h2>

    <!-- טקסט השיר -->
    <div class="song-box">
        <p>חדות וכהות,<br>
        שני קולות בנשימה אחת.<br>
        אני ביניהם<br>
        נעה על התפר הדק<br>
        בין מה שמפלח<br>
        לבין מה שמקהה,<br>
        בין אור מסנוור<br>
        לצל המרכך את הקצוות.</p>
    </div>

    <!-- תיבת הערות -->
    <div class="notes-box">
        <h3>כתיבת הערות והארות</h3>

        <input id="userName" placeholder="השם שלכם..." />

        <textarea id="userNote" placeholder="כתבו כאן את מחשבותיכם על השיר..."></textarea>

        <!-- כפתורים בשורה אחת -->
        <div class="btn-row">
            <a id="waLink" class="btn btn-main" target="_blank">ווצאפ לכותבת</a>
            <button class="btn btn-light" id="saveBtn">שמירת הערה</button>
        </div>

        <h4>הערות קוראים שנשמרו:</h4>
        <div id="notes"></div>
    </div>

    <!-- כפתורי ניווט -->
    <a href="../index.html" class="btn btn-main">עמוד ראשי</a>
    <a href="song.html" class="btn btn-light">חזרה לשירים</a>

    <!-- מערכת ההערות -->
    <script type="module">
        import { initNoteSystem } from "../notes.js";
        initNoteSystem();
    </script>

</div>

</body>
</html>
