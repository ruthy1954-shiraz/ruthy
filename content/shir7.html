<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדות וכהות / רות שנן</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="wrapper">

    <!-- תמונת השיר -->
    <div class="song-image">
        <img src="images/shir7.jpeg" alt="ציור לשיר חדות וכהות">
    </div>

    <!-- כותרות -->
    <h1 class="song-title">חדות וכהות</h1>
    <h2 class="song-author">רות שנן</h2>

    <!-- טקסט השיר -->
    <div class="song-box">
        <p>חדות וכהות,<br>
        שני קולות בנשימה אחת.<br>
        אני ביניהם<br>
        נעה על התפר הדק<br>
        בין מה שמפלח<br>
        לבין מה שמקהה,<br>
        בין אור מסנוור<br>
        לצל המרכך את הקצוות.</p>
    </div>

    <!-- תיבת הערות -->
    <div class="notes-box">
        <h3>כתיבת הערות והארות</h3>

        <input id="userName" placeholder="השם שלכם..." />
        <input id="userSong" placeholder="שם השיר..." value="חדות וכהות" />
        <textarea id="userNote" placeholder="כתבו כאן את מחשבותיכם על השיר..."></textarea>

        <div class="footer-nav" style="margin-top:15px;">
            <a id="waLink">ווצאפ לכותבת</a> |
            <a id="saveLink">שמירת הערה</a>
        </div>

        <h4>הערות קוראים שנשמרו:</h4>
        <div id="notes"></div>
    </div>

    <!-- ניווט -->
    <div class="footer-nav">
        <a href="../index.html">עמוד ראשי</a> |
        <a href="song.html">חזרה לשירים</a>
    </div>

    <!-- כפתור שיתוף -->
    <button class="share-btn" onclick="shareSong()">שתפו את השיר</button>

</div> <!-- סוף wrapper -->

<!-- מזהה ייחודי לשיר -->
<script>
    var songId = "7";
</script>

<!-- מערכת ההערות + ווצאפ -->
<script type="module">
    import { initNoteSystem, saveNoteToFirestore } from "../notes.js";

    initNoteSystem(songId);

    const waLink = document.getElementById("waLink");
    const saveLink = document.getElementById("saveLink");

    const phone = "972545305123";

    waLink.addEventListener("click", function() {
        const name = document.getElementById("userName").value.trim();
        const song = document.getElementById("userSong").value.trim();
        const note = document.getElementById("userNote").value.trim();

        const message =
            `שם הכותב: ${name}\n` +
            `שם השיר: ${song}\n` +
            `הערה: ${note}`;

        const encoded = encodeURIComponent(message);
        window.open(`https://wa.me/${phone}?text=${encoded}`, "_blank");
    });

    saveLink.addEventListener("click", function() {
        const name = document.getElementById("userName").value.trim();
        const song = document.getElementById("userSong").value.trim();
        const note = document.getElementById("userNote").value.trim();

        saveNoteToFirestore(name, song, note, songId);
    });
</script>

<!-- פונקציית שיתוף -->
<script>
function shareSong() {
    if (navigator.share) {
        navigator.share({
            title: document.title,
            text: "רציתי לשתף את השיר הזה:",
            url: window.location.href
        });
    } else {
        alert("הדפדפן לא תומך בשיתוף אוטומטי");
    }
}
</script>

<!-- עיצוב כפתור השיתוף -->
<style>
.share-btn {
    margin: 25px auto;
    padding: 12px 20px;
    background-color: #f2e6ff;
    border: 1px solid #d3b8ff;
    border-radius: 8px;
    font-size: 18px;
    color: #4a2c6b;
    cursor: pointer;
    display: block;
    width: 200px;
    transition: 0.2s;
}
.share-btn:hover {
    background-color: #e8d6ff;
}
</style>

</body>
</html>
