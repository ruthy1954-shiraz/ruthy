<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צרפו את השיר שלכם</title>
    <link rel="stylesheet" href="/ruthy/style.css?v=30">

    <style>
        .wrapper {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        #openCopilotBtn {
            background-color: #2196f3;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            border: none;
        }

        #savePoem {
            background-color: #4caf50;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <h1>צרפו את השיר שלכם</h1>

    <div class="poet-image-box">
        <img id="poetImagePreview" src="../images/default-poem.jpg" alt="תמונת המשורר" style="width:150px; border-radius:10px;">
    </div>

    <label>תמונת המשורר:</label>
    <input id="poetImage" class="song-input" placeholder="images/poets/poet.jpg">

    <button id="openCopilotBtn" type="button">
        צייר לי תמונה ב‑Copilot
    </button>

    <br><br>

    <label>שם השיר:</label>
    <input id="poemTitle" class="song-input" placeholder="שם השיר...">

    <label>שם המשורר:</label>
    <input id="poetName" class="song-input" placeholder="שם המשורר...">

    <label>תוכן השיר:</label>
    <textarea id="poemText" class="song-textarea auto-expand" placeholder="כתבו כאן את השיר שלכם..."></textarea>

    <div id="savePoem">שמירת השיר</div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMepXTjui58oUJOaVQgmXo8L0IjT1pPxQ",
      authDomain: "ruthy-notes.firebaseapp.com",
      projectId: "ruthy-notes",
      storageBucket: "ruthy-notes.firebasestorage.app",
      messagingSenderId: "276333962292",
      appId: "1:276333962292:web:298a0e8db8b5f77c359661",
      measurementId: "G-6MDZNCXET4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const titleInput = document.getElementById("poemTitle");
    const authorInput = document.getElementById("poetName");
    const textInput = document.getElementById("poemText");
    const imageInput = document.getElementById("poetImage");
    const imagePreview = document.getElementById("poetImagePreview");

    // פתיחת Copilot עם טקסט השיר
    document.getElementById("openCopilotBtn").addEventListener("click", () => {
        const text = textInput.value.trim();

        if (!text) {
            alert("כתבי קודם את השיר, ואז נוכל ליצור תמונה.");
            return;
        }

        const prompt = encodeURIComponent(
            "צייר לי תמונה שמתאימה לשיר הבא:\n\n" + text
        );

        window.open("https://copilot.microsoft.com/?q=" + prompt, "_blank");
    });

    // שמירת שיר
    document.getElementById("savePoem").addEventListener("click", async () => {
        const title = titleInput.value.trim();
        const author = authorInput.value.trim();
        const text = textInput.value.trim();
        const image = imageInput.value.trim();

        if (!title || !author || !text) {
            alert("יש למלא את כל השדות");
            return;
        }

        await addDoc(collection(db, "poems"), {
            title,
            author,
            text,
            image,
            createdAt: serverTimestamp()
        });

        alert("השיר נשמר בהצלחה!");
        window.location.href = "poets.html";
    });
</script>

</body>
</html>
