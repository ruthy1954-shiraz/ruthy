<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כתיבת שיר חדש</title>
    <link rel="stylesheet" href="/ruthy/style.css?v=30">
</head>

<body>

<div class="wrapper">

    <h1 class="song-title">כתיבת שיר חדש</h1>

    <form id="poemForm">
        <input id="title" placeholder="כותרת השיר" required>
        <input id="author" placeholder="שם המשורר" required>
        <textarea id="text" placeholder="כתבי כאן את השיר..." required></textarea>
        <button type="submit">שמרי שיר</button>
    </form>

    <div class="footer-nav" style="margin-top:20px;">
        <a href="poets.html" class="join-btn">חזרה לבימת המשוררים</a>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMepXTjui58oUJOaVQgmXo8L0IjT1pPxQ",
      authDomain: "ruthy-notes.firebaseapp.com",
      projectId: "ruthy-notes",
      storageBucket: "ruthy-notes.firebasestorage.app",
      messagingSenderId: "276333962292",
      appId: "1:276333962292:web:298a0e8db8b5f77c359661",
      measurementId: "G-6MDZNCXET4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById("poemForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const title = document.getElementById("title").value;
        const author = document.getElementById("author").value;
        const text = document.getElementById("text").value;

        await addDoc(collection(db, "poems"), {
            title,
            author,
            text,
            createdAt: serverTimestamp()
        });

        alert("השיר נשמר בהצלחה!");
        window.location.href = "poets.html";
    });
</script>

</body>
</html>
