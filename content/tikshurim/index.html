<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תקשורים</title>

    <!-- קישור לקובץ העיצוב -->
    <link rel="stylesheet" href="tikshurim.css">
</head>

<body>

<div class="wrapper tik-page">

    <!-- תמונת האלה -->
    <div class="or_haela-center">
        <img src="or_haela.jpeg" alt="האלה" class="or_haela-img">
    </div>

    <!-- כותרת התקשור -->
    <h1 class="tik-title">אזהרת מלחמה</h1>
    <h2 class="tik-subtitle">03-09-2026</h2>

    <!-- תיבת התקשור -->
    <div class="tik-box">
        <p>
            <!-- כאן תוכן התקשור שלך -->
            זהו תקשור חשוב המגיע מתוך אנרגיה של אור ואזהרה...
        </p>
    </div>

    <!-- שלוש נקודות -->
    <a id="moreBtn" class="more-link">...</a>

    <!-- המשך התקשור -->
    <div id="moreText" style="display:none; margin-top:15px;">
        <p>
            <!-- כאן ההמשך המלא של התקשור -->
        </p>
    </div>

    <!-- תיבת ההערות -->
    <div class="notes-box tik-notes">

        <h3>השאירו הערה לתקשור</h3>

        <input type="text" id="userName" placeholder="שם הכותב">
        <input type="text" id="userSong" placeholder="שם התקשור">
        <textarea id="userNote" placeholder="הערה..."></textarea>

        <!-- כפתורי ווצאפ ושמירה -->
        <div class="footer-nav tik-footer" style="margin-top:15px;">
            <a id="waLink">ווצאפ לכותבת</a>
            <a id="saveLink">שמירת הערה</a>
        </div>

        <!-- הערות שנשמרו -->
        <h3 style="margin-top:30px;">הערות קוראים שנשמרו</h3>
        <div id="notes"></div>

    </div>
</div>

<!-- פתיחת שלוש נקודות -->
<script>
document.addEventListener("DOMContentLoaded", function() {
    const btn = document.getElementById("moreBtn");
    const more = document.getElementById("moreText");

    btn.addEventListener("click", function() {
        more.style.display = "block";
        btn.style.display = "none";
    });
});
</script>

<!-- ווצאפ -->
<script>
const waLink = document.getElementById("waLink");
const phone = "972545305123";

waLink.addEventListener("click", function() {
    const name = document.getElementById("userName").value.trim();
    const song = document.getElementById("userSong").value.trim();
    const note = document.getElementById("userNote").value.trim();

    const message =
        `שם הכותב: ${name}\n` +
        `תקשור: ${song}\n` +
        `הערה: ${note}`;

    const encoded = encodeURIComponent(message);
    window.open(`https://wa.me/${phone}?text=${encoded}`, "_blank");
});
</script>

<!-- שמירת הערות + תאריך ושעה -->
<script type="module">
import { initNoteSystem, saveNoteToFirestore } from "./notes.js";

initNoteSystem("tikshurim");

const saveLink = document.getElementById("saveLink");

saveLink.addEventListener("click", async function() {
    const name = document.getElementById("userName").value.trim();
    const song = document.getElementById("userSong").value.trim();
    const note = document.getElementById("userNote").value.trim();

    await saveNoteToFirestore(name, song, note, "tikshurim");

    const now = new Date();
    const dateString = now.toLocaleString("he-IL", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
    });

    const notesDiv = document.getElementById("notes");
    const newNote = document.createElement("div");
    newNote.className = "note-card";
    newNote.innerHTML = `
        <strong>${name}</strong><br>
        ${note}<br>
        <span class="note-date">${dateString}</span>
    `;
    notesDiv.prepend(newNote);

    document.getElementById("userNote").value = "";
});
</script>

</body>
</html>
